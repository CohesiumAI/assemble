name: hotfix-release
description: "Emergency production fix — rapid diagnosis, patch, minimal validation, and deployment"
trigger: /hotfix
output_dir: "{assemble_output}/hotfix_{timestamp}"
steps:
  - step: 1
    agent: qa
    action: "Diagnostiquer l'incident in production et documenter les conditions de reproduction"
    outputs: [incident-report.md, reproduction-steps.md]
  - step: 2
    agent: security
    action: "Evaluate the security impact of the incident and prioritize the fix"
    inputs: [01-qa/incident-report.md]
    outputs: [security-assessment.md, priority-level.md]
    depends_on: [1]
  - step: 3
    agent: dev-fullstack
    action: "Implement le patch correctif minimal"
    inputs: [01-qa/incident-report.md, 01-qa/reproduction-steps.md, 02-security/priority-level.md]
    outputs: [hotfix-patch.md, rollback-plan.md]
    depends_on: [1, 2]
  - step: 4
    agent: qa
    action: "Validate the patch with a subset of critical regression tests"
    inputs: [03-dev-fullstack/hotfix-patch.md, 01-qa/reproduction-steps.md]
    outputs: [minimal-test-report.md, validation-status.md]
    depends_on: [3]
  - step: 5
    agent: devops
    action: "Deploy the hotfix to production with rollback ready and enhanced monitoring"
    inputs: [03-dev-fullstack/hotfix-patch.md, 03-dev-fullstack/rollback-plan.md, 04-qa/validation-status.md]
    outputs: [deployment-log.md, monitoring-checklist.md]
    depends_on: [4]
