name: seo-content-pipeline
description: "SEO content creation pipeline — from keyword research to GEO/AIO optimization"
trigger: /seo
output_dir: "{assemble_output}/seo_{timestamp}"
steps:
  - step: 1
    agent: seo
    action: "Perform keyword research and define content strategy"
    outputs: [keyword-research.md, content-strategy.md]
  - step: 2
    agent: content-seo
    action: "Write the content brief and structure the semantics"
    inputs: [01-seo/keyword-research.md, 01-seo/content-strategy.md]
    outputs: [content-brief.md, semantic-structure.md]
    depends_on: [1]
  - step: 3
    agent: copywriter
    action: "Write the SEO-optimized article draft"
    inputs: [02-content-seo/content-brief.md, 02-content-seo/semantic-structure.md, 01-seo/keyword-research.md]
    outputs: [article-draft.md, meta-tags.md]
    depends_on: [2]
  - step: 4
    agent: geo-aio
    action: "Optimize content for geolocalized search and generative AI"
    inputs: [03-copywriter/article-draft.md, 01-seo/keyword-research.md, 02-content-seo/semantic-structure.md]
    outputs: [geo-optimization.md, aio-recommendations.md]
    depends_on: [3]
