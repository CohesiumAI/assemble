name: release-cycle
description: "Production release cycle — validation, deployment, and communication"
trigger: /release
output_dir: "{assemble_output}/release_{timestamp}"
steps:
  - step: 1
    agent: scrum
    action: "Prepare the release checklist and validate scope completion"
    outputs: [release-checklist.md, scope-validation.md]
  - step: 2
    agent: qa
    action: "Perform final validation and execute regression tests"
    inputs: [01-scrum/release-checklist.md, 01-scrum/scope-validation.md]
    outputs: [qa-sign-off.md, regression-results.md]
    depends_on: [1]
  - step: 3
    agent: security
    action: "Validate security compliance before production deployment"
    inputs: [02-qa/qa-sign-off.md, 02-qa/regression-results.md, 01-scrum/release-checklist.md]
    outputs: [security-clearance.md, final-audit.md]
    depends_on: [2]
  - step: 4
    agent: legal
    action: "Verify regulatory compliance of the release (GDPR, ToS, legal notices)"
    inputs: [01-scrum/scope-validation.md, 03-security/security-clearance.md]
    outputs: [compliance-sign-off.md, legal-notes.md]
    depends_on: [3]
  - step: 5
    agent: devops
    action: "Prepare the deployment runbook and rollback plan"
    inputs: [03-security/security-clearance.md, 04-legal/compliance-sign-off.md, 02-qa/qa-sign-off.md]
    outputs: [deploy-runbook.md, rollback-plan.md]
    depends_on: [3, 4]
  # Steps 6 and 7 can run in parallel after deployment
  - step: 6
    agent: marketing
    action: "Write l'annonce de la release et le changelog public"
    inputs: [05-devops/deploy-runbook.md, 01-scrum/scope-validation.md]
    outputs: [announcement.md, changelog.md]
    depends_on: [5]
  - step: 7
    agent: pr-comms
    action: "Prepare the press release and external communication plan"
    inputs: [06-marketing/announcement.md, 01-scrum/scope-validation.md]
    outputs: [press-release.md, comms-plan.md]
    depends_on: [6]
  - step: 8
    agent: customer-success
    action: "Prepare la communication client et le plan d'accompagnement post-release"
    inputs: [06-marketing/announcement.md, 06-marketing/changelog.md]
    outputs: [customer-notification.md, adoption-plan.md]
    depends_on: [6]
