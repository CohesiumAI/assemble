name: security-audit
description: "Complete security audit — vulnerability detection, remediation, and compliance"
trigger: /security
output_dir: "{assemble_output}/security_{timestamp}"
steps:
  - step: 1
    agent: security
    action: "Scan and identify vulnerabilities in code and infrastructure (blue team audit)"
    outputs: [vulnerability-report.md, threat-model.md]
  - step: 2
    agent: redteam
    action: "Offensively test found vulnerabilities and search for new ones (red team pentest)"
    inputs: [01-security/vulnerability-report.md, 01-security/threat-model.md]
    outputs: [pentest-report.md, exploit-chains.md]
    depends_on: [1]
  - step: 3
    agent: dev-backend
    action: "Develop the remediation plan for all identified vulnerabilities"
    inputs: [01-security/vulnerability-report.md, 02-redteam/pentest-report.md, 02-redteam/exploit-chains.md]
    outputs: [remediation-plan.md, patching-schedule.md]
    depends_on: [2]
  - step: 4
    agent: devops
    action: "Harden infrastructure and configuration security"
    inputs: [01-security/vulnerability-report.md, 03-dev-backend/remediation-plan.md]
    outputs: [infrastructure-hardening.md, security-config.md]
    depends_on: [3]
  - step: 5
    agent: legal
    action: "Verify regulatory compliance and legal obligations"
    inputs: [01-security/vulnerability-report.md, 02-redteam/pentest-report.md, 04-devops/infrastructure-hardening.md, 03-dev-backend/remediation-plan.md]
    outputs: [compliance-check.md, regulatory-summary.md]
    depends_on: [4]
