name: dependency-upgrade
description: "Dependency update — breaking changes analysis, upgrade, compatibility tests"
trigger: /upgrade
output_dir: "{assemble_output}/upgrade_{timestamp}"
steps:
  - step: 1
    agent: architect
    action: "Analyze dependencies to update, identify breaking changes and assess risks"
    outputs: [dependency-audit.md, breaking-changes.md, risk-assessment.md]
  - step: 2
    agent: security
    action: "Verify les CVE connues sur les versions actuelles et valider les versions cibles"
    inputs: [01-architect/dependency-audit.md]
    outputs: [cve-report.md, version-recommendations.md]
    depends_on: [1]
  # Steps 3 can start after both 1 and 2
  - step: 3
    agent: dev-fullstack
    action: "Apply updates and fix breaking changes"
    inputs: [01-architect/dependency-audit.md, 01-architect/breaking-changes.md, 02-security/version-recommendations.md]
    outputs: [upgrade-log.md, migration-notes.md]
    depends_on: [1, 2]
  - step: 4
    agent: qa
    action: "Execute compatibility tests and validate absence of regressions"
    inputs: [03-dev-fullstack/upgrade-log.md, 03-dev-fullstack/migration-notes.md]
    outputs: [compatibility-report.md, regression-results.md]
    depends_on: [3]
  - step: 5
    agent: devops
    action: "Deploy progressively with performance metrics monitoring"
    inputs: [03-dev-fullstack/upgrade-log.md, 04-qa/compatibility-report.md, 04-qa/regression-results.md]
    outputs: [rollout-plan.md, monitoring-dashboard.md]
    depends_on: [4]
