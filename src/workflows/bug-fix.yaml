name: bug-fix
description: "Structured bug fix — from analysis to fix validation"
trigger: /bugfix
output_dir: "{assemble_output}/bugfix_{timestamp}"
steps:
  - step: 1
    agent: qa
    action: "Analyze the bug, reproduce the problem and document the conditions"
    outputs: [bug-analysis.md, reproduction-steps.md]
  - step: 2
    agent: dev-fullstack
    action: "Propose and implement the bug fix"
    inputs: [01-qa/bug-analysis.md, 01-qa/reproduction-steps.md]
    outputs: [fix-proposal.md, fix-implementation.md]
    depends_on: [1]
  - step: 3
    agent: qa
    action: "Execute regression tests and validate the fix"
    inputs: [02-dev-fullstack/fix-proposal.md, 02-dev-fullstack/fix-implementation.md, 01-qa/bug-analysis.md]
    outputs: [regression-test.md, validation-report.md]
    depends_on: [2]
