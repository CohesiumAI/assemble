name: sprint-cycle
description: "Cycle de sprint Agile complet — de la planification à la livraison"
trigger: /sprint
output_dir: "{cohesium_output}/sprint_{timestamp}"
steps:
  - step: 1
    agent: scrum
    action: "Préparer le backlog du sprint et planifier les cérémonies"
    outputs: [sprint-backlog.md, ceremony-plan.md]
  - step: 2
    agent: pm
    action: "Définir les objectifs du sprint et prioriser les user stories"
    inputs: [01-scrum/sprint-backlog.md, 01-scrum/ceremony-plan.md]
    outputs: [sprint-goals.md, prioritized-stories.md]
    depends_on: [1]
  - step: 3
    agent: dev
    action: "Implémenter les user stories et documenter les développements"
    inputs: [02-pm/sprint-goals.md, 02-pm/prioritized-stories.md, 01-scrum/sprint-backlog.md]
    outputs: [implementation-log.md, technical-notes.md]
    depends_on: [2]
  - step: 4
    agent: qa
    action: "Tester les développements du sprint et rapporter les résultats"
    inputs: [03-dev/implementation-log.md, 02-pm/prioritized-stories.md, 02-pm/sprint-goals.md]
    outputs: [test-results.md, defects-log.md]
    depends_on: [3]
  - step: 5
    agent: devops
    action: "Préparer la release et rédiger les notes de version"
    inputs: [03-dev/implementation-log.md, 04-qa/test-results.md, 04-qa/defects-log.md]
    outputs: [release-notes.md, deployment-summary.md]
    depends_on: [4]
