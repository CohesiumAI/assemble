name: sprint-cycle
description: "Complete Agile sprint cycle — from planning to delivery"
trigger: /sprint
output_dir: "{assemble_output}/sprint_{timestamp}"
steps:
  - step: 1
    agent: scrum
    action: "Prepare the sprint backlog and plan ceremonies"
    outputs: [sprint-backlog.md, ceremony-plan.md]
  - step: 2
    agent: pm
    action: "Define les objectifs du sprint et prioriser les user stories"
    inputs: [01-scrum/sprint-backlog.md, 01-scrum/ceremony-plan.md]
    outputs: [sprint-goals.md, prioritized-stories.md]
    depends_on: [1]
  - step: 3
    agent: dev-fullstack
    action: "Implement user stories and document developments"
    inputs: [02-pm/sprint-goals.md, 02-pm/prioritized-stories.md, 01-scrum/sprint-backlog.md]
    outputs: [implementation-log.md, technical-notes.md]
    depends_on: [2]
  - step: 4
    agent: qa
    action: "Test sprint developments and report results"
    inputs: [03-dev-fullstack/implementation-log.md, 02-pm/prioritized-stories.md, 02-pm/sprint-goals.md]
    outputs: [test-results.md, defects-log.md]
    depends_on: [3]
  - step: 5
    agent: devops
    action: "Prepare the release and write release notes"
    inputs: [03-dev-fullstack/implementation-log.md, 04-qa/test-results.md, 04-qa/defects-log.md]
    outputs: [release-notes.md, deployment-summary.md]
    depends_on: [4]
