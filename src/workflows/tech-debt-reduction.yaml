name: tech-debt-reduction
description: "Technical debt reduction — inventory, refactoring, and validation"
trigger: /refactor
output_dir: "{assemble_output}/refactor_{timestamp}"
steps:
  - step: 1
    agent: architect
    action: "Inventory technical debt and analyze its impact on the system"
    outputs: [debt-inventory.md, impact-analysis.md]
  - step: 2
    agent: dev-fullstack
    action: "Develop the refactoring plan and migration guide"
    inputs: [01-architect/debt-inventory.md, 01-architect/impact-analysis.md]
    outputs: [refactoring-plan.md, migration-guide.md]
    depends_on: [1]
  - step: 3
    agent: qa
    action: "Verify test coverage and validate post-refactoring regressions"
    inputs: [02-dev-fullstack/refactoring-plan.md, 02-dev-fullstack/migration-guide.md, 01-architect/debt-inventory.md]
    outputs: [test-coverage.md, regression-report.md]
    depends_on: [2]
  - step: 4
    agent: devops
    action: "Plan the deployment of refactoring changes"
    inputs: [02-dev-fullstack/refactoring-plan.md, 03-qa/test-coverage.md, 03-qa/regression-report.md]
    outputs: [deployment-plan.md, rollback-strategy.md]
    depends_on: [3]
