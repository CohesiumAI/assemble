    description: "Réduction de la dette technique (Architect → Fullstack → QA → DevOps)"
    visible: false

  - name: /hotfix
    type: shortcut
    workflow: hotfix-release
    description: "Hotfix production (QA → Security → Fullstack → QA → DevOps)"
    visible: false

  - name: /upgrade
    type: shortcut
    workflow: dependency-upgrade
    description: "Mise à jour des dépendances (Architect → Security → Fullstack → QA → DevOps)"
    visible: false

  - name: /campaign
    type: shortcut
    workflow: marketing-campaign
    description: "Campagne marketing (Marketing → Finance → Brand → Copy → Ads + Social + PR → Growth)"
    visible: false

  - name: /seo
    type: shortcut
