# Assemble — Registre des commandes
# Architecture: 10 primary commands + hidden shortcuts + internal skills + agents via @mention

# ═══════════════════════════════════════════
# PRIMARY COMMANDS (10 — visible in autocomplete)
# ═══════════════════════════════════════════

primary_commands:

  - name: /go
    type: system
    description: "Jarvis routes — assesses complexity (trivial/moderate/complex), selects agents, applies methodology"
    usage: "/go <your request>"
    category: system

  - name: /party
    type: system
    description: "Persistent multi-agent collaborative session"
    usage: "/party [team] <your request>"
    category: system

  - name: /dismiss
    type: system
    description: "End the current agent or party session"
    usage: "/dismiss [agent]"
    category: system

  - name: /help
    type: system
    description: "Show catalog (agents, workflows, examples)"
    category: system

  - name: /review
    type: shortcut
    workflow: code-review-pipeline
    description: "Code review pipeline (4 agents: Fullstack → QA → Security → Contrarian)"
    category: shortcut

  - name: /bugfix
    type: shortcut
    workflow: bug-fix
    description: "Bug fix workflow (3 agents: QA → Dev → QA)"
    category: shortcut

  - name: /feature
    type: shortcut
    workflow: feature-development
    description: "Feature development (5 agents: PM → Analyst → Architect → Dev → QA)"
    category: shortcut

  - name: /sprint
    type: shortcut
    workflow: sprint-cycle
    description: "Sprint cycle (5 agents: Scrum → PM → Fullstack → QA → DevOps)"
    category: shortcut

  - name: /release
    type: shortcut
    workflow: release-cycle
    description: "Release cycle (8 agents: Scrum → QA → Security → Legal → DevOps → Marketing → PR → CS)"
    category: shortcut

  - name: /mvp
    type: shortcut
    workflow: mvp-launch
    description: "MVP launch (9 agents: PM → Architect → UX → Brand → DB → Backend → Frontend → QA → DevOps)"
    category: shortcut

# ═══════════════════════════════════════════
# HIDDEN SHORTCUTS (work if typed, not in autocomplete)
# ═══════════════════════════════════════════

hidden_shortcuts:

  - name: /refactor
