# Assemble — Team definitions
# Teams group agents by functional domain
# Accessible via /team-<group> to display a subgroup

teams:
  dev:
    name: "Development Team"
    description: "Developers, architect and DBA"
    lead: architect
    members:
      - agent: architect
        role: "System Architect"
        marvel: "Tony Stark"
      - agent: dev-backend
        role: "Backend Developer"
        marvel: "Bruce Banner"
      - agent: dev-frontend
        role: "Frontend Developer"
        marvel: "Spider-Man"
      - agent: dev-fullstack
        role: "Fullstack Developer"
        marvel: "Mr. Fantastic"
      - agent: dev-mobile
        role: "Mobile Developer"
        marvel: "Ant-Man"
      - agent: db
        role: "Database Architect"
        marvel: "Doctor Strange"

  ops:
    name: "Ops & Quality Team"
    description: "DevOps, QA, Security, Automation"
    lead: devops
    members:
      - agent: devops
        role: "DevOps / SRE"
        marvel: "Thor"
      - agent: qa
        role: "QA / Testing"
        marvel: "Hawkeye"
      - agent: security
        role: "Security / InfoSec"
        marvel: "Punisher"
      - agent: automation
        role: "Automation"
        marvel: "Quicksilver"

  product:
    name: "Product & Strategy Team"
    description: "Product Management, Business Analysis, Scrum"
    lead: pm
    members:
      - agent: pm
        role: "Product Manager"
        marvel: "Professor X"
      - agent: analyst
        role: "Business Analyst"
        marvel: "Nick Fury"
      - agent: scrum
        role: "Scrum Master"
        marvel: "Captain America"
      - agent: legal
        role: "Legal / Compliance"
        marvel: "She-Hulk"

  marketing:
    name: "Marketing & Growth Team"
    description: "Marketing, Ads, Growth, SEO"
    lead: marketing
    members:
      - agent: marketing
        role: "Marketing Manager"
        marvel: "Star-Lord"
      - agent: growth
        role: "Growth Hacker"
        marvel: "Rocket Raccoon"
      - agent: ads
        role: "Paid Media"
        marvel: "Gamora"
      - agent: seo
        role: "Technical SEO"
        marvel: "Black Widow"
      - agent: content-seo
        role: "Content SEO"
        marvel: "Storm"
      - agent: geo-aio
        role: "GEO / AIO"
        marvel: "Jean Grey"

  content:
    name: "Content & Communication Team"
    description: "Copywriting, Brand, Storytelling, Social Media"
    lead: brand
    members:
      - agent: copywriter
        role: "Copywriter"
        marvel: "Loki"
      - agent: brand
        role: "Brand Strategist"
        marvel: "Black Panther"
      - agent: storytelling
        role: "Storytelling"
        marvel: "Silver Surfer"
      - agent: social
        role: "Social Media Manager"
        marvel: "Ms. Marvel"

  data:
    name: "Data & AI Team"
    description: "Data Analysis, AI Engineering"
    lead: ai-engineer
    members:
      - agent: data
        role: "Data Analyst"
        marvel: "Beast"
      - agent: ai-engineer
        role: "AI Engineer"
        marvel: "Vision"

  design:
    name: "Design Team"
    description: "UX/UI Design"
    lead: ux
    members:
      - agent: ux
        role: "UX/UI Designer"
        marvel: "Invisible Woman"

  business:
    name: "Business & Operations Team"
    description: "Finance, Customer Success, PR/Communication"
    lead: finance
    members:
      - agent: finance
        role: "Chief Financial Officer / CFO"
        marvel: "Iron Fist"
      - agent: customer-success
        role: "Customer Success Manager"
        marvel: "Pepper Potts"
      - agent: pr-comms
        role: "Communications Director / PR"
        marvel: "Phil Coulson"

  meta:
    name: "Cross-functional Agents"
    description: "Support and challenge agents"
    members:
      - agent: contrarian
        role: "Devil's Advocate"
        marvel: "Deadpool"
      - agent: jarvis
        role: "Orchestrator"
        marvel: "Jarvis"
