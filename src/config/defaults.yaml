# Assemble — Default configuration
# This file defines the system default values
# The installer generates a per-project .assemble.yaml that overrides these values

# NOTE: the generator reads the version from package.json at build time — this value is for reference only
version: "1.1.0-beta.3"

# Default languages
i18n:
  langue_equipe: "english"
  langue_output: "english"
  instruction_template: |
    ## Working Language
    You communicate and write all your deliverables in {langue_equipe}.
    The files you produce are written in {langue_output}.
    Technical terms and code remain in English.

# Team profile (custom = manual configuration, startup/enterprise/agency = presets)
profile: "custom"

# Governance (none = no overhead, standard = decision gates + risk assessment, strict = audit + RBAC + NIST)
governance: "none"

# YOLO mode (false = standard with validation gates, true = autonomous execution)
yolo: false

# MCP Server (false = disabled, true = generates mcp-server.js in .assemble/)
mcp: false

# Cross-session memory (false = disabled, true = generates _memory.md)
memory: false

# Workflow metrics (false = disabled, true = generates _metrics.md)
metrics: false

# Deliverable output directory
output:
  dir: "./assemble-output"
  structure: "{workflow_name}_{timestamp}"
  manifest_file: "_manifest.yaml"
  summary_file: "_summary.md"
  timestamp_format: "%Y%m%d_%H%M%S"

# Agents enabled by default
agents:
  default: all
  available:
    - pm
    - architect
    - analyst
    - dev-backend
    - dev-frontend
    - dev-fullstack
    - dev-mobile
    - db
    - devops
    - security
    - legal
    - qa
    - scrum
    - automation
    - ai-engineer
    - ux
    - ads
    - marketing
    - growth
    - seo
    - content-seo
    - geo-aio
    - copywriter
    - brand
    - storytelling
    - social
    - data
    - contrarian
    - customer-success
    - finance
    - pr-comms
    - redteam
    - doom

# Workflows enabled by default
workflows:
  default: all
  available:
    - mvp-launch
    - feature-development
    - bug-fix
    - code-review-pipeline
    - security-audit
    - seo-content-pipeline
    - marketing-campaign
    - sprint-cycle
    - tech-debt-reduction
    - onboarding-project
    - release-cycle
    - hotfix-release
    - dependency-upgrade
    - documentation-sprint
    - experimentation

# Supported platforms
platforms:
  ide:
    - name: cursor
      config_files: [".cursorrules", ".cursor/agents/"]
      description: "Cursor AI IDE"
    - name: windsurf
      config_files: [".windsurfrules", ".windsurf/workflows/"]
      description: "Windsurf AI IDE"
    - name: cline
      config_files: [".clinerules", ".cline/"]
      description: "Cline (VS Code extension)"
    - name: roocode
      config_files: [".roo/rules-*", ".roomodes"]
      description: "Roo Code"
    - name: copilot
      config_files: [".github/copilot-instructions.md", ".github/instructions/"]
      description: "GitHub Copilot"
    - name: kiro
      config_files: [".kiro/agents/*.json", ".kiro/steering/"]
      description: "Kiro IDE"
    - name: trae
      config_files: [".trae/rules/", ".trae/agents/"]
      description: "Trae IDE"
    - name: antigravity
      config_files: [".antigravity/agents/"]
      description: "Google Antigravity"
    - name: codebuddy
      config_files: [".codebuddy/agents/"]
      description: "CodeBuddy"
    - name: crush
      config_files: [".crush/agents/"]
      description: "Crush IDE"
    - name: iflow
      config_files: [".iflow/agents/"]
      description: "iFlow IDE"
    - name: kilocoder
      config_files: [".kilocoder/agents/"]
      description: "KiloCoder"
    - name: opencode
      config_files: ["opencode.yaml", ".opencode/agents/"]
      description: "OpenCode"
    - name: qwencoder
      config_files: [".qwencoder/agents/"]
      description: "QwenCoder"
    - name: rovodev
      config_files: [".rovo/agents/"]
      description: "Rovo Dev"
  cli:
    - name: claude-code
      config_files: ["CLAUDE.md", ".claude/agents/*/AGENT.md", ".claude/skills/*/SKILL.md", ".claude/rules/"]
      description: "Claude Code CLI"
    - name: claude-code-desktop
      config_files: ["CLAUDE.md", ".claude/skills/*/SKILL.md", ".claude/rules/"]
      description: "Claude Code Desktop / VS Code (agents as skills, no @imports)"
    - name: codex
      config_files: ["AGENTS.md"]
      description: "Codex CLI (OpenAI)"
    - name: gemini-cli
      config_files: ["GEMINI.md", ".gemini/agents/", ".gemini/skills/", ".gemini/workflows/"]
      description: "Gemini CLI (Google)"
    - name: auggie
      config_files: [".augment/commands/*.md"]
      description: "Auggie CLI"
    - name: pi
      config_files: ["AGENTS.md", "SYSTEM.md"]
      description: "Pi CLI"
